server:
  port: 8083

spring:
  application:
    name: premium-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pksdb}
    username: ${DB_USER:pksadmin}
    password: ${DB_PASSWORD:pkspassword}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:pksInsuranceSecretKey2024ChangeInProduction!}

services:
  user-service: ${USER_SERVICE_URL:http://localhost:8081}
  vehicle-service: ${VEHICLE_SERVICE_URL:http://localhost:8082}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      vehicle-service:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
