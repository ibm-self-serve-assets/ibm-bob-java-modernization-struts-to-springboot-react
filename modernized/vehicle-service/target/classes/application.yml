server:
  port: 8082

spring:
  application:
    name: vehicle-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pksdb}
    username: ${DB_USER:pksadmin}
    password: ${DB_PASSWORD:pkspassword}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:pksInsuranceSecretKey2024ChangeInProduction!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
